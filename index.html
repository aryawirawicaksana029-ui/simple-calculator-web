<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
    transition: background-color 0.3s;
  }

  body.dark {
    background-color: #1e1e1e;
  }

  .calculator {
    width: 300px;
    background: #ffffff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: background-color 0.3s;
  }

  body.dark .calculator {
    background: #2b2b2b;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .top-bar h2 {
    margin: 0;
    font-size: 16px;
    color: #555;
  }

  body.dark .top-bar h2 {
    color: #ccc;
  }

  #darkModeBtn {
    background: none;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
  }

  body.dark #darkModeBtn {
    border-color: #555;
    color: #ccc;
  }

  .screen {
    background: #fafafa;
    border-radius: 10px;
    padding: 15px;
    text-align: right;
    margin-bottom: 15px;
    min-height: 70px;
  }

  body.dark .screen {
    background: #1e1e1e;
  }

  #previousText {
    font-size: 14px;
    color: #999;
    min-height: 16px;
  }

  #currentText {
    font-size: 32px;
    font-weight: bold;
    color: #222;
    word-wrap: break-word;
  }

  body.dark #currentText {
    color: #f0f0f0;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .buttons button {
    padding: 16px 0;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #eee;
    cursor: pointer;
  }

  body.dark .buttons button {
    background: #3a3a3a;
    color: #fff;
  }

  .buttons button:hover {
    background: #ddd;
  }

  body.dark .buttons button:hover {
    background: #4a4a4a;
  }

  .operator {
    background: #333 !important;
    color: white;
  }

  body.dark .operator {
    background: #ff8c42 !important;
    color: #000;
  }

  .clear-btn {
    color: #e63946;
  }

  .wide {
    grid-column: span 2;
  }
</style>
</head>
<body>

<div class="calculator">

  <div class="top-bar">
    <h2>Calculator</h2>
    <button id="darkModeBtn">Dark Mode</button>
  </div>

  <div class="screen">
    <div id="previousText"></div>
    <div id="currentText">0</div>
  </div>

  <div class="buttons">
    <button class="clear-btn wide" onclick="clearAll()">C</button>
    <button onclick="deleteLast()">DEL</button>
    <button class="operator" onclick="chooseOperator('/')">/</button>

    <button onclick="addNumber('7')">7</button>
    <button onclick="addNumber('8')">8</button>
    <button onclick="addNumber('9')">9</button>
    <button class="operator" onclick="chooseOperator('*')">x</button>

    <button onclick="addNumber('4')">4</button>
    <button onclick="addNumber('5')">5</button>
    <button onclick="addNumber('6')">6</button>
    <button class="operator" onclick="chooseOperator('-')">-</button>

    <button onclick="addNumber('1')">1</button>
    <button onclick="addNumber('2')">2</button>
    <button onclick="addNumber('3')">3</button>
    <button class="operator" onclick="chooseOperator('+')">+</button>

    <button class="wide" onclick="addNumber('0')">0</button>
    <button onclick="addNumber('.')">.</button>
    <button class="operator" onclick="calculate()">=</button>
  </div>

</div>

<script>
// these two hold the numbers being worked with
let currentInput = "0";
let previousInput = "";
let selectedOperator = null;

let previousText = document.getElementById("previousText");
let currentText = document.getElementById("currentText");

function updateScreen() {
  currentText.innerText = currentInput;

  if (selectedOperator != null) {
    previousText.innerText = previousInput + " " + selectedOperator;
  } else {
    previousText.innerText = "";
  }
}

function addNumber(num) {
  // don't allow two dots
  if (num === "." && currentInput.includes(".")) {
    return;
  }

  if (currentInput === "0" && num !== ".") {
    currentInput = num;
  } else {
    currentInput = currentInput + num;
  }

  updateScreen();
}

function chooseOperator(op) {
  if (currentInput === "") return;

  // if there's already a previous number waiting, calculate first
  if (previousInput !== "") {
    calculate();
  }

  selectedOperator = op;
  previousInput = currentInput;
  currentInput = "0";

  updateScreen();
}

function calculate() {
  let num1 = parseFloat(previousInput);
  let num2 = parseFloat(currentInput);
  let result;

  if (isNaN(num1) || isNaN(num2)) {
    return;
  }

  if (selectedOperator === "+") {
    result = num1 + num2;
  } else if (selectedOperator === "-") {
    result = num1 - num2;
  } else if (selectedOperator === "*") {
    result = num1 * num2;
  } else if (selectedOperator === "/") {
    if (num2 === 0) {
      currentText.innerText = "Can't divide by zero";
      currentInput = "0";
      previousInput = "";
      selectedOperator = null;
      previousText.innerText = "";
      return;
    }
    result = num1 / num2;
  } else {
    return;
  }

  currentInput = result.toString();
  previousInput = "";
  selectedOperator = null;

  updateScreen();
}

function clearAll() {
  currentInput = "0";
  previousInput = "";
  selectedOperator = null;
  updateScreen();
}

function deleteLast() {
  currentInput = currentInput.slice(0, -1);
  if (currentInput === "") {
    currentInput = "0";
  }
  updateScreen();
}

// dark mode toggle
let darkModeBtn = document.getElementById("darkModeBtn");

darkModeBtn.addEventListener("click", function() {
  document.body.classList.toggle("dark");
});
</script>

</body>
</html>
